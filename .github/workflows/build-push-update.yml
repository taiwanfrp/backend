name: Build, Push to GHCR, and Update Manifests

on:
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - '.github/workflows/build-push-update.yml'
      - 'pyproject.toml'
      - 'uv.lock'

jobs:
  build_and_update:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # 允許推送到 GHCR

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get Image Tag
        id: meta
        run: echo "TAG=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Build and Push Docker Image to GHCR
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/backend:${{ steps.meta.outputs.TAG }}
            ghcr.io/${{ github.repository_owner }}/backend:latest

      - name: Checkout GitOps Manifests Repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/gitops
          path: gitops
          token: ${{ secrets.DEPLOY_PAT }}
          ref: main

      - name: Update Deployment Image Tag
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          sed -i "s|image: ghcr.io/${OWNER_LC}/backend:.*|image: ghcr.io/${OWNER_LC}/backend:${{ steps.meta.outputs.TAG }}|g" gitops/deployment.yaml

      - name: Import GPG Key
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          # passphrase: ${{ secrets.GPG_PASSPHRASE }}
          git_user_signingkey: true
          git_commit_gpgsign: true
          git_committer_name: "TaiwanFRP Deploy Bot"
          git_committer_email: "deploy@taiwanfrp.me"

      - name: Commit and Push Changes
        run: |
          cd gitops
          git config user.name "TaiwanFRP Deploy Bot"
          git config user.email "deploy@taiwanfrp.me"
          git status
          git commit -a -S -m "chore(backend): Update backend image tag to ${{ steps.meta.outputs.TAG }}"
          git push origin main